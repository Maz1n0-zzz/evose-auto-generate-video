<head>
    <meta charset="UTF-8" />
    <title>Evose Overlay Frame · 1080x1920</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }
        body { font-family: "Inter Tight", system-ui, sans-serif; color: #FFFFFF; }


        /* Gradient scrim giúp header/footer nổi bật trên mọi nền */
        .scrim-top {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 280px;
            background: linear-gradient(180deg, rgba(10,21,50,0.85) 0%, rgba(10,21,50,0.4) 60%, rgba(10,21,50,0) 100%);
            z-index: 5;
        }
        .scrim-bottom {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 240px;
            background: linear-gradient(0deg, rgba(10,21,50,0.85) 0%, rgba(10,21,50,0.4) 60%, rgba(10,21,50,0) 100%);
            z-index: 5;
        }

        /* HEADER */
        .header {
            position: absolute;
            top: 70px;
            left: 120px;
            right: 120px;
            height: 110px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 10;
        }
        .header .logo {
            width: 80px;
            height: 80px;
            flex-shrink: 0;
        }
        .header .logo svg { width: 100%; height: 100%; display: block; }
        .header .title-block {
            display: flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1.15;
        }
        .header .title-main {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #FFFFFF;
        }
        .header .title-sub {
            font-size: 20px;
            font-weight: 500;
            color: #A5B4FC;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* FOOTER */
        .footer {
            position: absolute;
            bottom: 90px;
            left: 120px;
            right: 120px;
            height: 50px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }
        .footer .socials {
            display: flex;
            flex-direction: row;
            gap: 22px;
            align-items: center;
        }
        .footer .socials .icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.92;
        }
        .footer .socials .icon svg {
            width: 32px;
            height: 32px;
            fill: #FFFFFF;
        }
        .footer .url {
            font-size: 26px;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: 1px;
            opacity: 0.94;
        }
    </style>
</head>
