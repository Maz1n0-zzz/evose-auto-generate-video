<!doctype html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=1080, height=1920"/><title>Chart Bars v2 · 9:16</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
:root{--navy:#0A1532;--accent:#3B82F6;--cyan:#67E8F9;--violet:#A855F7;--lav:#A5B4FC;--dim:#8A96AD;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1080px;height:1920px;overflow:hidden;color:#fff;font-family:'Be Vietnam Pro',sans-serif;background:radial-gradient(120% 80% at 84% 8%,rgba(59,130,246,.22),transparent 52%),radial-gradient(90% 70% at 10% 0%,rgba(168,85,247,.16),transparent 55%),#0A1532;}
#root{position:relative;width:1080px;height:1920px;}
.blob{position:absolute;border-radius:50%;mix-blend-mode:screen;pointer-events:none;}
.blob1{width:560px;height:560px;left:-80px;top:100px;background:radial-gradient(circle,rgba(59,130,246,.32),transparent 65%);filter:blur(44px);animation:fl1 5s ease-in-out infinite;}
.blob2{width:440px;height:440px;right:-60px;top:720px;background:radial-gradient(circle,rgba(103,232,249,.26),transparent 65%);filter:blur(52px);animation:fl2 4s ease-in-out infinite .6s;}
.blob3{width:360px;height:360px;left:200px;bottom:280px;background:radial-gradient(circle,rgba(165,180,252,.22),transparent 65%);filter:blur(46px);animation:fl3 6s ease-in-out infinite 1.2s;}
@keyframes fl1{0%,100%{transform:translate(0,0);}50%{transform:translate(55px,-65px);}}
@keyframes fl2{0%,100%{transform:translate(0,0);}50%{transform:translate(-48px,55px);}}
@keyframes fl3{0%,100%{transform:translate(0,0);}50%{transform:translate(38px,-48px);}}
.c-label{position:absolute;left:120px;top:250px;font-family:'JetBrains Mono',monospace;font-size:26px;letter-spacing:4px;color:var(--lav);text-transform:uppercase;opacity:0;animation:fi .6s .2s forwards;}
.c-title{position:absolute;left:120px;right:120px;top:305px;font-weight:900;font-size:76px;line-height:1.05;letter-spacing:-2px;opacity:0;transform:translateY(30px);animation:fu .7s cubic-bezier(.16,1,.3,1) .35s forwards;}
.c-title .hl{background:linear-gradient(135deg,#67E8F9,#3B82F6 40%,#6366F1 75%,#A855F7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.chart{position:absolute;left:120px;right:120px;top:560px;height:1020px;display:flex;align-items:flex-end;justify-content:center;gap:44px;padding:0 10px 90px;border-bottom:2px solid rgba(165,180,252,.22);}
.col{flex:1;max-width:180px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;position:relative;}
.bar{width:100%;border-radius:16px 16px 4px 4px;background:linear-gradient(180deg,#67E8F9,#3B82F6 45%,#6366F1 80%,#A855F7);box-shadow:0 0 40px rgba(59,130,246,.35);height:0;animation:barGrow .9s cubic-bezier(.16,1,.3,1) forwards;}
.bar.dim{background:linear-gradient(180deg,#3a4a72,#243252);box-shadow:none;opacity:.55;}
.bar-val{position:absolute;top:-60px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:40px;opacity:0;animation:fu .5s ease-out forwards;}
.bar-lbl{margin-top:22px;font-size:30px;font-weight:600;color:var(--dim);text-align:center;opacity:0;animation:fi .5s ease-out forwards;}
.bar-lbl.on{color:#fff;}
.c-cap{position:absolute;left:120px;right:120px;top:1640px;font-size:38px;font-weight:600;color:var(--lav);line-height:1.3;opacity:0;transform:translateY(20px);animation:fu .7s cubic-bezier(.16,1,.3,1) 1.9s forwards;}
@keyframes fi{to{opacity:1;}}@keyframes fu{to{opacity:1;transform:translateY(0);}}@keyframes barGrow{from{height:0;}to{height:var(--h);}}
</style></head>
<body><div id="root" data-composition-id="main" data-start="0" data-duration="20" data-width="1080" data-height="1920">
<div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div>
<div class="c-label"></div><h1 class="c-title"></h1><div class="chart"></div><div class="c-cap"></div>
</div>
<script>(function(){
var v=(window.__hyperframes&&typeof window.__hyperframes.getVariables==="function")?window.__hyperframes.getVariables():{};
var set=function(s,t){var e=document.querySelector(s);if(e&&t!=null)e.textContent=String(t);};
set(".c-label",v.label);set(".c-cap",v.caption);
document.querySelector(".c-title").innerHTML=(v.title||"").replace(/\{([^}]+)\}/g,'<span class="hl">$1</span>');
var bars=v.bars;if(typeof bars==="string"){try{bars=JSON.parse(bars);}catch(e){bars=[];}}
if(!Array.isArray(bars)||!bars.length)bars=[{label:"Q1",value:32},{label:"Q2",value:48},{label:"Q3",value:71,active:true},{label:"Q4",value:59}];
var maxV=Math.max.apply(null,bars.map(function(b){return+b.value||0;}));if(maxV<=0)maxV=1;
var chart=document.querySelector(".chart");
bars.forEach(function(b,i){
  var pct=Math.max(6,Math.round((+b.value||0)/maxV*100));var delay=(0.9+i*0.14).toFixed(2);
  var col=document.createElement("div");col.className="col";
  var val=document.createElement("div");val.className="bar-val";val.textContent=(b.value!=null?b.value:"")+(b.unit||"");val.style.animationDelay=(parseFloat(delay)+0.5)+"s";
  var bar=document.createElement("div");bar.className="bar"+(b.active===false?" dim":"");bar.style.setProperty("--h",pct+"%");bar.style.animationDelay=delay+"s";
  var lbl=document.createElement("div");lbl.className="bar-lbl"+(b.active?" on":"");lbl.textContent=b.label||"";lbl.style.animationDelay=(parseFloat(delay)+0.3)+"s";
  col.appendChild(val);col.appendChild(bar);col.appendChild(lbl);chart.appendChild(col);
});
window.__timelines=window.__timelines||{};window.__timelines["main"]={pause:function(){},seek:function(){},paused:function(){return true;}};
})();</script></body></html>
