<!doctype html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=1080, height=1920"/><title>Chart Line · 9:16</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
:root{--navy:#0A1532;--accent:#3B82F6;--cyan:#67E8F9;--violet:#A855F7;--lav:#A5B4FC;--dim:#8A96AD;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1080px;height:1920px;overflow:hidden;color:#fff;font-family:'Be Vietnam Pro',sans-serif;
 background:radial-gradient(120% 80% at 84% 8%,rgba(59,130,246,.22),transparent 52%),radial-gradient(90% 70% at 10% 0%,rgba(168,85,247,.16),transparent 55%),#0A1532;}
#root{position:relative;width:1080px;height:1920px;}
.c-label{position:absolute;left:120px;top:250px;font-family:'JetBrains Mono',monospace;font-size:26px;letter-spacing:4px;color:var(--lav);text-transform:uppercase;opacity:0;animation:fi .6s .2s forwards;}
.c-title{position:absolute;left:120px;right:120px;top:300px;font-weight:900;font-size:74px;line-height:1.02;letter-spacing:-2px;opacity:0;transform:translateY(30px);animation:fu .7s cubic-bezier(.16,1,.3,1) .35s forwards;}
.c-title .hl{background:linear-gradient(135deg,#67E8F9,#3B82F6 40%,#6366F1 75%,#A855F7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.chart-box{position:absolute;left:100px;right:100px;top:560px;height:1000px;}
.grid line{stroke:rgba(165,180,252,.12);stroke-width:2;}
.area{fill:url(#agrad);opacity:0;animation:fi 1s 1.5s forwards;}
.line{fill:none;stroke:url(#lgrad);stroke-width:10;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:var(--len);stroke-dashoffset:var(--len);animation:draw 1.8s cubic-bezier(.4,0,.2,1) .8s forwards;filter:drop-shadow(0 0 18px rgba(59,130,246,.5));}
.dot{fill:#fff;stroke:#3B82F6;stroke-width:5;opacity:0;}
.xlbl{fill:var(--dim);font-size:28px;font-weight:600;text-anchor:middle;font-family:'Be Vietnam Pro';}
.c-cap{position:absolute;left:120px;right:120px;top:1640px;font-size:38px;font-weight:600;color:var(--lav);line-height:1.3;opacity:0;transform:translateY(20px);animation:fu .7s cubic-bezier(.16,1,.3,1) 2.4s forwards;}
@keyframes fi{to{opacity:1;}}@keyframes fu{to{opacity:1;transform:translateY(0);}}@keyframes draw{to{stroke-dashoffset:0;}}@keyframes pop{to{opacity:1;}}
</style></head>
<body><div id="root" data-composition-id="main" data-start="0" data-duration="20" data-width="1080" data-height="1920"><div class="c-label"></div><h1 class="c-title"></h1>
<div class="chart-box"><svg id="svg" width="880" height="1000" viewBox="0 0 880 1000" preserveAspectRatio="none">
<defs><linearGradient id="lgrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#67E8F9"/><stop offset=".5" stop-color="#3B82F6"/><stop offset="1" stop-color="#A855F7"/></linearGradient>
<linearGradient id="agrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="rgba(59,130,246,.35)"/><stop offset="1" stop-color="rgba(59,130,246,0)"/></linearGradient></defs>
<g class="grid"></g><path class="area"></path><polyline class="line"></polyline><g class="dots"></g><g class="xlbls"></g></svg></div>
<div class="c-cap"></div></div>
<script>(function(){
var v=(window.__hyperframes&&typeof window.__hyperframes.getVariables==="function")?window.__hyperframes.getVariables():{};
var set=function(s,t){var e=document.querySelector(s);if(e&&t!=null)e.textContent=String(t);};
set(".c-label",v.label);set(".c-cap",v.caption);
document.querySelector(".c-title").innerHTML=(v.title||"").replace(/\{([^}]+)\}/g,'<span class="hl">$1</span>');
var pts=v.points;if(typeof pts==="string"){try{pts=JSON.parse(pts);}catch(e){pts=[];}}
if(!Array.isArray(pts)||!pts.length)pts=[{label:"T1",value:20},{label:"T2",value:35},{label:"T3",value:30},{label:"T4",value:58},{label:"T5",value:72},{label:"T6",value:90}];
var W=880,H=1000,padX=80,padTop=80,padBot=90;var vals=pts.map(function(p){return +p.value||0;});
var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);if(mx===mn)mx=mn+1;
var n=pts.length,innerW=W-padX*2,innerH=H-padTop-padBot;
var X=function(i){return padX+innerW*(i/(n-1));};var Y=function(val){return padTop+innerH*(1-(val-mn)/(mx-mn));};
var g=document.querySelector(".grid");
for(var k=0;k<=3;k++){var y=padTop+innerH*k/3;var ln=document.createElementNS("http://www.w3.org/2000/svg","line");ln.setAttribute("x1",padX);ln.setAttribute("x2",W-padX);ln.setAttribute("y1",y);ln.setAttribute("y2",y);g.appendChild(ln);}
var poly=document.querySelector(".line");poly.setAttribute("points",pts.map(function(p,i){return X(i)+","+Y(+p.value||0);}).join(" "));
var len=poly.getTotalLength?poly.getTotalLength():2000;poly.style.setProperty("--len",len.toFixed(0));
document.querySelector(".area").setAttribute("d","M "+X(0)+","+(H-padBot)+" L "+pts.map(function(p,i){return X(i)+","+Y(+p.value||0);}).join(" L ")+" L "+X(n-1)+","+(H-padBot)+" Z");
var dots=document.querySelector(".dots"),xl=document.querySelector(".xlbls");
pts.forEach(function(p,i){
 var c=document.createElementNS("http://www.w3.org/2000/svg","circle");c.setAttribute("class","dot");c.setAttribute("cx",X(i));c.setAttribute("cy",Y(+p.value||0));c.setAttribute("r",12);c.style.animation="pop .4s ease-out "+(1.6+i*0.12).toFixed(2)+"s forwards";dots.appendChild(c);
 var t=document.createElementNS("http://www.w3.org/2000/svg","text");t.setAttribute("class","xlbl");t.setAttribute("x",X(i));t.setAttribute("y",H-30);t.textContent=p.label||"";xl.appendChild(t);
});
window.__timelines=window.__timelines||{};window.__timelines["main"]={pause:function(){},seek:function(){},paused:function(){return true;}};
})();</script></body></html>
