<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=1080, height=1920" />
        <title>Liquid Hero · Portrait 9:16</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;700;800;900&display=swap"
            rel="stylesheet"
        />
        <style>

/* === EVOSE BRAND BASE === */
:root {
    --evose-navy: #0A1532;
    --evose-deep: #050D1F;
    --evose-white: #FFFFFF;
    --evose-accent: #3B82F6;
    --evose-cyan: #60A5FA;
    --evose-lavender: #A5B4FC;
}
@keyframes evoseFadeUp {
    0% { opacity: 0; transform: translateY(36px); }
    100% { opacity: 1; transform: translateY(0); }
}
@keyframes evoseFadeIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
}
@keyframes evoseScaleIn {
    0% { opacity: 0; transform: scale(0.92); }
    100% { opacity: 1; transform: scale(1); }
}
.evose-fade-up { animation: evoseFadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both; }
.evose-fade-in { animation: evoseFadeIn 0.6s ease-out both; }
.evose-scale-in { animation: evoseScaleIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both; }


            /*
   * frame-liquid-bg-hero — "Aurora Violet" liquid background hero. Vendored from
   * nexu-io/html-video (Apache-2.0) and adapted to HyperFrames 0.6: Tailwind CDN
   * replaced with plain CSS, Noto Sans SC dropped, mix-blend-mode difference text
   * swapped for solid white + shadow (legibility for Vietnamese hooks), content
   * moved to data-composition-variables, plus a staggered text reveal. The
   * floating blurred blobs (CSS @keyframes) are the kept signature. Inter Tight
   * covers Vietnamese. See NOTICE. Portrait 9:16 (1080×1920).
   */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 1080px;
                height: 1920px;
                overflow: hidden;
            }
            #root {
                position: relative;
                width: 1080px;
                height: 1920px;
                overflow: hidden;
                background: #0A1532;
                color: #fafaf8;
                font-family: "Inter Tight", system-ui, sans-serif;
            }

            /* floating liquid blobs */
            .blob {
                position: absolute;
                border-radius: 50%;
                mix-blend-mode: screen;
                filter: blur(120px);
                will-change: transform;
                z-index: 0;
                opacity: 0.35;
            }
            @keyframes float1 {
                0%,
                100% {
                    transform: translate(0, 0) scale(1);
                }
                50% {
                    transform: translate(80px, -60px) scale(1.15);
                }
            }
            @keyframes float2 {
                0%,
                100% {
                    transform: translate(0, 0) scale(1.1);
                }
                50% {
                    transform: translate(-100px, 40px) scale(0.9);
                }
            }
            @keyframes float3 {
                0%,
                100% {
                    transform: translate(0, 0) scale(0.95);
                }
                50% {
                    transform: translate(50px, 80px) scale(1.2);
                }
            }
            .b1 {
                width: 480px;
                height: 480px;
                background: #1E3A8A;
                top: -100px;
                left: -120px;
                animation: float1 12s ease-in-out infinite;
            }
            .b2 {
                width: 400px;
                height: 400px;
                background: #1E40AF;
                top: 24%;
                right: -120px;
                animation: float2 10s ease-in-out infinite;
            }
            .b3 {
                width: 380px;
                height: 380px;
                background: #2563EB;
                bottom: -100px;
                left: 22%;
                animation: float3 14s ease-in-out infinite;
            }
            .b4 {
                width: 300px;
                height: 300px;
                background: #3B82F6;
                top: 64%;
                left: 6%;
                animation: float1 16s ease-in-out infinite;
            }

            /* neural network particle canvas */
            #neural-net {
                position: absolute;
                inset: 0;
                z-index: 2;
                pointer-events: none;
                opacity: 0.45;
            }


            /* soft dark scrim behind the title so the gradient headline
               (incl. its purple end) keeps full contrast over the blobs */
            .scrim {
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                width: 1180px;
                height: 1180px;
                z-index: 3;
                pointer-events: none;
                background: radial-gradient(
                    ellipse at center,
                    rgba(10, 21, 50, 0.75) 0%,
                    rgba(10, 21, 50, 0.55) 44%,
                    rgba(10, 21, 50, 0) 72%
                );
                filter: blur(24px);
            }

            .chip {
                position: absolute;
                left: 120px;
                right: 120px;
                display: flex;
                justify-content: space-between;
                font-size: 22px;
                letter-spacing: 4px;
                text-transform: uppercase;
                opacity: 0.7;
                z-index: 5;
                font-weight: 500;
                text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            }
            .chip.top {
                top: 90px;
            }
            .chip.bot {
                bottom: 90px;
            }

            .brand-bar {
                position: absolute;
                left: 0;
                right: 0;
                top: 160px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 22px;
                z-index: 5;
            }
            .brand-bar .logo-img {
                width: 128px;
                height: 128px;
                object-fit: contain;
            }
            .brand-bar .brand-label {
                font-size: 30px;
                font-weight: 700;
                letter-spacing: 1px;
                background: linear-gradient(90deg, #0cc0df 0%, #ffde59 100%);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
            }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(28px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .main {
                position: absolute;
                left: 120px;
                right: 120px;
                top: 50%;
                transform: translateY(-50%);
                z-index: 10;
                text-align: center;
            }
            .headline {
                word-spacing: 0.05em;
                font-weight: 900;
                letter-spacing: -1px;
                line-height: 1.12;
                font-size: 150px;
                text-transform: capitalize;
                background-image: linear-gradient(125deg, #F59E0B 0%, #EF4444 35%, #A5B4FC 65%, #3B82F6 100%);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                filter: drop-shadow(0 0 60px rgba(245, 158, 11, 0.35))
                    drop-shadow(0 8px 40px rgba(0, 0, 0, 0.65));
                opacity: 0;
                animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
            }
            .subheadline {
                margin-top: 40px;
                font-size: 40px;
                font-weight: 500;
                line-height: 1.4;
                color: #A5B4FC;
                opacity: 0.88;
                max-width: 880px;
                margin-left: auto;
                margin-right: auto;
                text-shadow: 0 2px 16px rgba(0, 0, 0, 0.4);
                animation: fadeUp 0.8s ease-out 0.75s both;
            }
        
            /* === EVOSE: hide built-in header/footer (replaced by overlay) === */
            .chip, .brand-bar { display: none !important; }
        
            /* === EVOSE SAFE ZONE (840x1320) === */
            .main {
                left: 120px !important;
                right: 120px !important;
                max-width: 840px !important;
            }
        </style>
    </head>
    <body>
        <div
            id="root"
            data-composition-id="main"
            data-start="0"
            data-duration="15"
            data-width="1080"
            data-height="1920"
            data-composition-variables='{"kicker": "EVOSE", "brand": "app.evose.ai", "headline": "GPT 5.5 ra mắt", "subheadline": "Mô hình AI mạnh nhất từ trước tới nay vừa được công bố.", "cta": "Theo dõi ngay"}'
        >
            <div class="blob b1"></div>
            <div class="blob b2"></div>
            <div class="blob b3"></div>
            <div class="blob b4"></div>
            <canvas id="neural-net" width="1080" height="1920"></canvas>
            <div class="scrim"></div>

            <div class="chip top">
                <span class="kicker"></span><span>9:16</span>
            </div>

            <div class="brand-bar">
                <img class="logo-img" src="../assets/logo.svg" />
                <span class="brand-label">Senior AI Engineer</span>
            </div>

            <div class="main">
                <h1 class="headline"></h1>
                <p class="subheadline"></p>
            </div>

            <div class="chip bot">
                <span class="brand"></span><span>Bản tin</span>
            </div>
        </div>

        <script>
            (function () {
                var v =
                    window.__hyperframes &&
                    typeof window.__hyperframes.getVariables === "function"
                        ? window.__hyperframes.getVariables()
                        : {};
                var set = function (sel, text) {
                    var el = document.querySelector(sel);
                    if (el && text != null) el.textContent = String(text);
                };
                set(".kicker", v.kicker);
                set(".brand", v.brand);
                set(".headline", v.headline);
                set(".subheadline", v.subheadline);
                // Optional caller-chosen headline gradient (else the vivid default).
                // Always use 3-stop so any 2-color pair stays vivid (hot-pink midpoint).
                if (v.headline_from && v.headline_to) {
                    var hl = document.querySelector(".headline");
                    if (hl)
                        hl.style.backgroundImage =
                            "linear-gradient(125deg, " +
                            v.headline_from +
                            " 0%, #ff4d6d 48%, " +
                            v.headline_to +
                            " 100%)";
                }

                /* Scale headline font to fit: (1) if full text needs >3 lines, scale for 3;
                   (2) if a single word overflows container width, scale for that word. */
                var hlEl = document.querySelector(".headline");
                if (hlEl && hlEl.textContent.trim()) {
                    var maxPx = 150, minPx = 60;
                    hlEl.style.fontSize = maxPx + "px";
                    var avail = hlEl.offsetWidth;
                    var probe = document.createElement("span");
                    probe.style.cssText = "position:absolute;visibility:hidden;white-space:nowrap;" +
                        "font-size:" + maxPx + "px;font-weight:900;" +
                        "font-family:'Inter Tight',system-ui,sans-serif;letter-spacing:-3px;";
                    document.body.appendChild(probe);
                    // Probe full text to detect multi-word line overflow
                    probe.textContent = hlEl.textContent.trim();
                    var totalW = probe.scrollWidth;
                    // Also probe widest single word
                    var maxWordW = 0;
                    hlEl.textContent.trim().split(/\s+/).forEach(function (w) {
                        probe.textContent = w;
                        if (probe.scrollWidth > maxWordW) maxWordW = probe.scrollWidth;
                    });
                    document.body.removeChild(probe);
                    var lineRatio = totalW / avail;
                    if (lineRatio > 3) {
                        // > 3 lines at max size: scale to target exactly 3 lines
                        hlEl.style.fontSize = Math.max(minPx, Math.floor(maxPx * 3 / lineRatio)) + "px";
                    } else if (maxWordW > avail) {
                        // Single word overflows: scale to fit the widest word
                        hlEl.style.fontSize = Math.max(minPx, Math.floor(maxPx * avail / maxWordW)) + "px";
                    }
                }
            })();
            /* ── Neural Network — HyperFrames-synced ── */
            /* _hfMs is updated by seek(t) below; particles use it as the clock.
               HyperFrames captures frames by calling seek(t) then screenshotting —
               so _hfMs is always the correct virtual frame time, not wall-clock. */
            var _hfMs = 0;

            (function () {
                var canvas = document.getElementById("neural-net");
                if (!canvas) return;
                var ctx = canvas.getContext("2d");
                var W = 1080, H = 1920;
                var N = 48;
                var CONNECT = 210;
                var COLORS = ["#38bdf8", "#7dd3fc", "#0ea5e9", "#bae6fd", "#5ce1e6"];

                var particles = [];
                for (var i = 0; i < N; i++) {
                    particles.push({
                        cx: Math.random() * W,
                        cy: Math.random() * H,
                        ax: 25 + Math.random() * 55,
                        ay: 25 + Math.random() * 55,
                        fx: 0.18 + Math.random() * 0.22,   /* rad/s (= /1000 * prev values) */
                        fy: 0.16 + Math.random() * 0.24,
                        px: Math.random() * Math.PI * 2,
                        py: Math.random() * Math.PI * 2,
                        x: 0, y: 0,
                        r: 2.5 + Math.random() * 5.5,
                        color: COLORS[Math.floor(Math.random() * COLORS.length)],
                        alpha: 0.35 + Math.random() * 0.5,
                    });
                }

                function drawAt(tSec) {
                    ctx.clearRect(0, 0, W, H);
                    for (var i = 0; i < N; i++) {
                        var p = particles[i];
                        p.x = p.cx + p.ax * Math.sin(p.fx * tSec + p.px);
                        p.y = p.cy + p.ay * Math.cos(p.fy * tSec + p.py);
                    }
                    for (var i = 0; i < N; i++) {
                        for (var j = i + 1; j < N; j++) {
                            var dx = particles[i].x - particles[j].x;
                            var dy = particles[i].y - particles[j].y;
                            var dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < CONNECT) {
                                ctx.strokeStyle = "rgba(56,189,248," +
                                    ((1 - dist / CONNECT) * 0.28).toFixed(3) + ")";
                                ctx.lineWidth = 1;
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.stroke();
                            }
                        }
                    }
                    for (var i = 0; i < N; i++) {
                        var p = particles[i];
                        ctx.globalAlpha = p.alpha;
                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                }

                /* expose so seek() can trigger an immediate redraw */
                window._drawNeural = drawAt;

                /* rAF loop — reads _hfMs updated by seek() each frame */
                (function loop() {
                    drawAt(_hfMs / 1000);
                    requestAnimationFrame(loop);
                })();
            })();

            window.__timelines = window.__timelines || {};
            window.__timelines["main"] = {
                pause: function () {},
                seek: function (t) {
                    /* t is virtual seconds provided by HyperFrames per frame */
                    _hfMs = (t || 0) * 1000;
                    if (window._drawNeural) window._drawNeural(t || 0);
                },
                paused: function () { return true; },
            };
        </script>
    </body>
</html>
