<!doctype html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=1080, height=1920"/><title>Screenshot News · 9:16</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
:root{--navy:#0A1532;--accent:#3B82F6;--cyan:#67E8F9;--violet:#A855F7;--lav:#A5B4FC;--dim:#8A96AD;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1080px;height:1920px;overflow:hidden;color:#fff;font-family:'Be Vietnam Pro',sans-serif;
 background:radial-gradient(120% 80% at 84% 8%,rgba(59,130,246,.22),transparent 52%),radial-gradient(90% 70% at 10% 0%,rgba(168,85,247,.16),transparent 55%),#0A1532;}
#root{position:relative;width:1080px;height:1920px;}
.c-label{position:absolute;left:120px;top:290px;font-family:'JetBrains Mono',monospace;font-size:26px;letter-spacing:4px;color:var(--lav);text-transform:uppercase;opacity:0;animation:fi .6s .2s forwards;}
.c-title{position:absolute;left:120px;right:120px;top:335px;font-weight:900;font-size:62px;line-height:1.05;letter-spacing:-2px;opacity:0;transform:translateY(30px);animation:fu .7s cubic-bezier(.16,1,.3,1) .35s forwards;}
.c-title .hl{background:linear-gradient(135deg,#67E8F9,#3B82F6 40%,#6366F1 75%,#A855F7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
/* device: giới hạn 500→1470 (cao 970) để chừa caption + footer overlay */
.device{position:absolute;left:150px;right:150px;top:500px;height:970px;border-radius:52px;overflow:hidden;background:#fff;box-shadow:0 40px 120px -30px rgba(0,0,0,.7),0 0 0 14px #1c2540,0 0 0 16px rgba(103,232,249,.2);opacity:0;transform:scale(.94);animation:pop .9s cubic-bezier(.16,1,.3,1) .7s forwards;}
.screen{position:absolute;inset:0;overflow:hidden;}
/* FIX: crop hiển thị phần TRÊN CÙNG của ảnh (nơi có tiêu đề bài) thay vì kéo dài toàn ảnh dài */
.shot{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;object-position:top center;display:block;}
.hl-box{position:absolute;border:6px solid #67E8F9;border-radius:14px;box-shadow:0 0 0 9999px rgba(5,13,31,.5),0 0 44px rgba(103,232,249,.6);opacity:0;z-index:5;animation:hl .6s cubic-bezier(.16,1,.3,1) 2.2s forwards;}
.c-cap{position:absolute;left:120px;right:120px;top:1500px;text-align:center;font-size:34px;font-weight:600;color:var(--lav);line-height:1.3;opacity:0;transform:translateY(20px);animation:fu .7s cubic-bezier(.16,1,.3,1) 2.6s forwards;}
@keyframes fi{to{opacity:1;}}@keyframes fu{to{opacity:1;transform:translateY(0);}}@keyframes pop{to{opacity:1;transform:scale(1);}}@keyframes hl{0%{opacity:0;transform:scale(1.12);}100%{opacity:1;transform:scale(1);}}
</style></head>
<body><div id="root"><div class="c-label"></div><h1 class="c-title"></h1>
<div class="device"><div class="screen"><img class="shot" alt=""/><div class="hl-box"></div></div></div>
<div class="c-cap"></div></div>
<script>(function(){
var v=(window.__hyperframes&&typeof window.__hyperframes.getVariables==="function")?window.__hyperframes.getVariables():{};
var set=function(s,t){var e=document.querySelector(s);if(e&&t!=null)e.textContent=String(t);};
set(".c-label",v.label);set(".c-cap",v.caption);
document.querySelector(".c-title").innerHTML=(v.title||"").replace(/\{([^}]+)\}/g,'<span class="hl">$1</span>');
var img=document.querySelector(".shot");if(v.image)img.src=v.image;
var hb=document.querySelector(".hl-box");
if(v.hl_top!=null){hb.style.top=v.hl_top;hb.style.left=(v.hl_left||"4%");hb.style.width=(v.hl_width||"92%");hb.style.height=(v.hl_height||"18%");}
else{hb.style.display="none";}
})();</script></body></html>
